<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thompson Motif Index Browser</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <h1>Motif Browser</h1>
        <span class="subtitle">Thompson's Motif-Index of Folk-Literature</span>
      </div>
      <nav class="tabs" role="tablist">
        <button class="tab active" data-tab="browse" role="tab">Browse</button>
        <button class="tab" data-tab="seed" role="tab">Seed</button>
      </nav>
      <div class="search" id="search-wrap">
        <input
          id="search-input"
          type="search"
          placeholder="Search 49,204 motifs by id, name, lemma, or region&hellip;"
          autocomplete="off"
          spellcheck="false"
        />
        <span id="search-count" class="search-count"></span>
      </div>
    </header>

    <main class="app-main" id="browse-view">
      <aside class="sidebar">
        <div class="sidebar-section">
          <h2>Chapters</h2>
          <ul id="chapter-list" class="chapter-list"></ul>
        </div>
        <div class="sidebar-section">
          <h2>Filter by region</h2>
          <select id="region-filter">
            <option value="">All regions</option>
          </select>
        </div>
        <div class="sidebar-section meta" id="meta-block"></div>
      </aside>

      <section class="content">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="list-header" id="list-header"></div>
        <div id="motif-list" class="motif-list"></div>
        <div id="list-empty" class="empty" hidden>No motifs match.</div>
        <div id="loading" class="loading" hidden>Loading&hellip;</div>
      </section>

      <aside class="detail" id="detail-panel">
        <div class="detail-placeholder">Pick a motif to see its details.</div>
      </aside>
    </main>

    <main class="seed-view" id="seed-view" hidden>
      <div class="seed-toolbar">
        <button id="generate-btn" class="primary-btn">Generate seed</button>
        <label class="count-field">
          Motifs:
          <input
            id="seed-count"
            type="number"
            min="1"
            max="12"
            value="5"
          />
        </label>
        <span class="seed-id" id="seed-id"></span>
      </div>

      <section class="seed-body" id="seed-body">
        <div class="seed-empty">
          Press <strong>Generate seed</strong> to roll a random set of motifs
          as the bones of a tale.
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
