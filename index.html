<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thompson Motif Index Browser</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <h1>Motif Browser</h1>
        <span class="subtitle">Thompson's Motif-Index of Folk-Literature</span>
      </div>
      <nav class="tabs" role="tablist">
        <button class="tab active" data-tab="browse" role="tab">Browse</button>
        <button class="tab" data-tab="draw" role="tab">Draw</button>
      </nav>
      <div class="search" id="search-wrap">
        <input
          id="search-input"
          type="search"
          placeholder="Search 49,204 motifs by id, name, lemma, or region&hellip;"
          autocomplete="off"
          spellcheck="false"
        />
        <span id="search-count" class="search-count"></span>
      </div>
    </header>

    <main class="app-main" id="browse-view">
      <aside class="sidebar">
        <div class="sidebar-section">
          <h2>Chapters</h2>
          <ul id="chapter-list" class="chapter-list"></ul>
        </div>
        <div class="sidebar-section">
          <h2>Filter by region</h2>
          <select id="region-filter">
            <option value="">All regions</option>
          </select>
        </div>
        <div class="sidebar-section meta" id="meta-block"></div>
      </aside>

      <section class="content">
        <button
          id="back-to-draw"
          class="back-pill"
          hidden
          title="Return to the draw you came from"
        >&larr; Back to draw</button>
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="list-header" id="list-header"></div>
        <div id="motif-list" class="motif-list"></div>
        <div id="list-empty" class="empty" hidden>No motifs match.</div>
        <div id="loading" class="loading" hidden>Loading&hellip;</div>
      </section>

      <aside class="detail" id="detail-panel">
        <div class="detail-placeholder">Pick a motif to see its details.</div>
      </aside>
    </main>

    <main class="draw-view" id="draw-view" hidden>
      <div class="draw-toolbar">
        <button id="new-draw-btn" class="primary-btn">Draw</button>
        <label class="count-field">
          Cards:
          <input
            id="draw-count"
            type="number"
            min="1"
            max="12"
            value="5"
          />
        </label>
        <span class="draw-id" id="draw-id"></span>
        <button
          id="copy-draw-btn"
          class="icon-btn-bare"
          title="Copy motif list as text"
          aria-label="Copy motif list"
        >
          <svg class="icon icon-copy" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="7" y="7" width="10" height="10" rx="2"/>
            <path d="M13 7V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/>
          </svg>
          <svg class="icon icon-check" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="4 10 8 14 16 6"/>
          </svg>
        </button>
      </div>

      <section class="draw-body" id="draw-body">
        <div class="draw-empty">
          Press <strong>New draw</strong> to deal a hand of motifs &mdash;
          the bones of a tale.
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
